<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>停车位监控系统</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <div>
          <p class="eyebrow">Parking Monitor</p>
          <h1>楼下停车位实时状态</h1>
          <p class="description">
            通过固定摄像头持续检测停车位是否空闲，出门前先看一眼，避免开进去又倒出来。
          </p>
        </div>
        <div class="summary-card">
          <p>当前状态</p>
          <strong id="state">加载中</strong>
          <span id="counts">--</span>
          <small id="updatedAt">--</small>
        </div>
      </section>

      <section class="panel-grid">
        <article class="panel">
          <div class="panel-header">
            <h2>车位状态</h2>
          </div>
          <div id="slotList" class="slot-list"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>当前画面</h2>
            <button id="refreshFrameBtn" type="button">刷新截图</button>
          </div>
          <img id="frameImage" alt="停车位监控画面" />
        </article>
      </section>
    </main>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
