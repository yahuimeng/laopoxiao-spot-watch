<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老破小车位哨兵</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <div>
          <p class="eyebrow">LaoPoXiao Spot Watch</p>
          <h1>老破小车位哨兵</h1>
          <p class="description">通过固定摄像头持续检测楼下停车位，实时查看空位，并在检测到空位时触发微信提醒。</p>
        </div>
        <div class="summary-card">
          <p>当前状态</p>
          <strong id="state">加载中</strong>
          <span id="counts">--</span>
          <small id="updatedAt">--</small>
          <small id="notificationState">微信提醒：未配置</small>
        </div>
      </section>
      <section class="panel-grid">
        <article class="panel">
          <div class="panel-header"><h2>车位状态</h2></div>
          <div id="slotList" class="slot-list"></div>
        </article>
        <article class="panel">
          <div class="panel-header">
            <h2>当前画面</h2>
            <button id="refreshFrameBtn" type="button">刷新截图</button>
          </div>
          <img id="frameImage" alt="停车位监控画面" />
        </article>
      </section>
      <section class="panel-grid analytics-grid">
        <article class="panel">
          <div class="panel-header"><h2>每周趋势</h2></div>
          <div id="weeklySummary" class="analytics-copy"></div>
          <div id="weekdayList" class="trend-list"></div>
        </article>
        <article class="panel">
          <div class="panel-header"><h2>高峰时段</h2></div>
          <div id="hourlySummary" class="analytics-copy"></div>
          <div id="hourlyList" class="trend-list"></div>
        </article>
      </section>
    </main>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
